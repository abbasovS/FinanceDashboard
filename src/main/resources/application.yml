spring:
  application:
    name: FinanceDashboard

  datasource:
    url: jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: ${JWT_SECRET:Tk5GQ0dWb3p1TVY5UDN5SmR0aHFmU0VJZW8wS1B4bWlENk1Kc1JxYzdNRT0=}
    expiration-ms: 86400000

  bootstrap:
    admin:
      username: ${ADMIN_USER:admin}
      password: ${ADMIN_PASS:admin123}